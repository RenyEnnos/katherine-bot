name: CI

on:
  pull_request:
    branches:
      - main

jobs:

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: '1.162.4'

      - name: Start Supabase
        run: supabase start

      - name: Run Database Tests
        run: |
          supabase db reset
          supabase test db

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pytest & Supabase Py
        run: pip install pytest supabase

      - name: Run Integration Tests
        run: |
          # Use supabase status to extract keys directly
          export SUPABASE_URL="http://127.0.0.1:54321"
          export SUPABASE_ANON_KEY=$(supabase status -o env | grep ANON_KEY | cut -d '=' -f2 | tr -d '"')
          export SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o env | grep SERVICE_ROLE_KEY | cut -d '=' -f2 | tr -d '"')
          export PYTHONPATH="."
          python -m pytest backend/tests/test_database_authorization_integration.py

      - name: Stop Supabase
        if: always()
        run: supabase stop
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install -r backend/requirements.txt
          python -m pip install -r backend/requirements-test.txt
          python -m pip check

      - name: Verify CPU-only Torch
        run: |
          python -c "import torch; assert '+cpu' in torch.__version__, 'Torch is not CPU-only variant'"
          python -c "import torch; assert torch.cuda.is_available() is False, 'CUDA is available'"
          python -m pip freeze > installed.txt
          ! grep -iE 'nvidia-|cuda-|nvidia-cublas-|nvidia-cudnn-|nvidia-nccl-' installed.txt

      - name: Compile Backend
        run: |
          python -m compileall -q backend

      - name: Run Tests
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
          PYTHONPATH: "."
        run: |
          python -m pytest backend/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Audit dependencies
        working-directory: ./frontend
        run: |
          set +e
          npm audit --json > audit.json
          audit_exit=$?
          set -e
          echo "npm audit finalizado com exit code: $audit_exit"
          node scripts/audit-validator.js audit.json $audit_exit

      - name: Archive Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: frontend/audit.json

      - name: Run Tests
        working-directory: ./frontend
        run: npm test

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Build
        working-directory: ./frontend
        run: npm run build
