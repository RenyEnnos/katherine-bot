name: Sync repository labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.json
      - .github/workflows/sync-labels.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const desired = JSON.parse(
              fs.readFileSync('.github/labels.json', 'utf8')
            );
            const { owner, repo } = context.repo;
            const existing = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              { owner, repo, per_page: 100 }
            );
            const existingNames = new Set(existing.map((label) => label.name));

            for (const label of desired) {
              const payload = {
                owner,
                repo,
                name: label.name,
                color: label.color,
                description: label.description
              };

              if (existingNames.has(label.name)) {
                await github.rest.issues.updateLabel(payload);
                core.info(`Updated ${label.name}`);
              } else {
                await github.rest.issues.createLabel(payload);
                core.info(`Created ${label.name}`);
              }
            }
